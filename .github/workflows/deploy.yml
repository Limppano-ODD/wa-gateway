name: Deploy Application
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'hml'
        type: choice
        options:
          - hml
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-hml:
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'hml'
    runs-on: dockerhml
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Docker access
        run: docker info

      - name: Copiar projeto para /app/${{ github.event.repository.name }}
        run: |
          echo "Copiando projeto para /app (HML)"
          cp -r . /app/${{ github.event.repository.name }} || true

      - name: Debug - Verificar conectividade de rede
        run: |
          echo "🔍 Verificando conectividade de rede..."
          echo "📡 Testando resolução DNS do RDS:"
          nslookup db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com || echo "⚠️ DNS resolution falhou"
          
          echo ""
          echo "🌐 Testando conectividade com RDS (porta 5432):"
          timeout 5 bash -c 'cat < /dev/null > /dev/tcp/db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com/5432' && echo "✅ Porta 5432 acessível" || echo "❌ Porta 5432 inacessível"
          
          echo ""
          echo "📋 Informações de rede do host:"
          ip addr show | grep -E 'inet |eth0|ens'
          
          echo ""
          echo "🔧 Testando DNS público:"
          nslookup google.com || echo "⚠️ DNS público falhou"

      - name: Debug - Verificar variáveis de ambiente
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Verificando variáveis de ambiente..."
          echo "📊 DATABASE_URL configurada: $(if [ -n \"$DATABASE_URL\" ]; then echo 'SIM'; else echo 'NÃO'; fi)"
          
          if [ -n "$DATABASE_URL" ]; then
            echo "📏 Tamanho da DATABASE_URL: ${#DATABASE_URL} caracteres"
            echo "🔗 Primeiros 50 caracteres: ${DATABASE_URL:0:50}..."
            echo "🔗 Últimos 30 caracteres: ...${DATABASE_URL: -30}"
            
            # Extract database host from URL
            DB_HOST=$(echo "$DATABASE_URL" | sed -E 's/.*@([^:\/]+).*/\1/')
            echo "🖥️ Host extraído da URL: $DB_HOST"
            
            # Test DNS resolution of extracted host
            echo "📡 Testando DNS do host extraído:"
            nslookup "$DB_HOST" || echo "⚠️ Falha ao resolver $DB_HOST"
          else
            echo "❌ DATABASE_URL não está definida!"
          fi
          
          echo ""
          echo "🔧 Outras variáveis importantes:"
          echo "NODE_ENV: ${{ secrets.NODE_ENV }}"
          echo "JWT_SECRET configurado: $(if [ -n \"${{ secrets.JWT_SECRET }}\" ]; then echo 'SIM'; else echo 'NÃO'; fi)"

      - name: Fazer deploy HML via Docker Compose
        id: deploy
        env:
          REDIRECT_PATH: ${{ secrets.REDIRECT_PATH }}
          SCOPE: ${{ secrets.SCOPE }}
          ENDPOINT: ${{ secrets.ENDPOINT }}
          VENDEDORES_API_URL: ${{ secrets.VENDEDORES_API_URL }}
          VENDEDORES_API_USERNAME: ${{ secrets.VENDEDORES_API_USERNAME }}
          VENDEDORES_API_PASSWORD: ${{ secrets.VENDEDORES_API_PASSWORD }}
          VENDEDORES_API_EMAIL: ${{ secrets.VENDEDORES_API_EMAIL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Iniciando deploy HML na pasta /app/${{ github.event.repository.name }}"
          cd /app/${{ github.event.repository.name }}/
          docker compose up -d --build

      - name: Debug - Verificar container e variáveis internas (HML)
        run: |
          echo "🔍 Verificando estado do container..."
          cd /app/${{ github.event.repository.name }}/
          
          echo "📊 Status dos containers:"
          docker compose ps
          
          echo ""
          echo "🔍 Verificando variáveis de ambiente dentro do container:"
          docker compose exec -T data-gateway sh -c 'env | grep -E "^(DATABASE_URL|NODE_ENV|SANKHYA)" | while IFS= read -r line; do
            var_name=$(echo "$line" | cut -d= -f1)
            var_value=$(echo "$line" | cut -d= -f2-)
            if [ "$var_name" = "DATABASE_URL" ]; then
              echo "$var_name length: ${#var_value} chars"
              echo "$var_name starts with: ${var_value:0:60}..."
              echo "$var_name ends with: ...${var_value: -40}"
            elif [[ "$var_name" =~ PASSWORD|TOKEN|APPKEY|SECRET ]]; then
              echo "$var_name=[MASKED]"
            else
              echo "$var_name=$var_value"
            fi
          done' || echo "⚠️ Falha ao acessar variáveis"
          
          echo ""
          echo "🌐 Testando DNS dentro do container:"
          docker compose exec -T data-gateway nslookup db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com || echo "⚠️ DNS falhou dentro do container"
          
          echo ""
          echo "📋 Primeiros logs do container:"
          docker compose logs data-gateway --tail=50

      - name: Health check após deploy HML
        run: |
          echo "Aguardando aplicação HML ficar saudável..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3000/ > /dev/null; then
              echo "✅ Aplicação HML está saudável"
              break
            fi
            echo "⏳ Aguardando aplicação HML ficar saudável... ($i/30)"
            sleep 10
          done

          if [ $i -eq 30 ]; then
            echo "❌ Falha no health check após deploy HML"
            echo "📊 Status dos containers:"
            cd /app/${{ github.event.repository.name }}/
            docker compose ps
            echo "📋 Logs do serviço data-gateway:"
            docker compose logs data-gateway --tail=100
            exit 1
          fi

      - name: Notificar sucesso do deploy HML
        if: success()
        run: |
          echo "✅ Deploy HML realizado com sucesso!"
          cd /app/${{ github.event.repository.name }}/
          echo "📊 Status final dos containers:"
          docker compose ps

      - name: Rollback em caso de falha HML
        if: failure()
        run: |
          echo "❌ Deploy HML falhou, iniciando rollback..."
          cd /app/${{ github.event.repository.name }}/
          echo "📋 Logs antes do rollback:"
          docker compose logs data-gateway --tail=50
          docker compose down
          docker compose up -d --no-build
          echo "🔄 Rollback HML concluído"

  deploy-prod:
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    runs-on: dockerprod
    environment: production
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Docker access
        run: docker info

      - name: Copiar projeto para /app/${{ github.event.repository.name }}
        run: |
          echo "Copiando projeto para /app"
          cp -r . /app/${{ github.event.repository.name }} || true

      - name: Debug - Verificar conectividade de rede (PROD)
        run: |
          echo "🔍 Verificando conectividade de rede..."
          echo "📡 Testando resolução DNS do RDS:"
          nslookup db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com || echo "⚠️ DNS resolution falhou"
          
          echo ""
          echo "🌐 Testando conectividade com RDS (porta 5432):"
          timeout 5 bash -c 'cat < /dev/null > /dev/tcp/db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com/5432' && echo "✅ Porta 5432 acessível" || echo "❌ Porta 5432 inacessível"
          
          echo ""
          echo "📋 Informações de rede do host:"
          ip addr show | grep -E 'inet |eth0|ens'
          
          echo ""
          echo "🔧 Testando DNS público:"
          nslookup google.com || echo "⚠️ DNS público falhou"

      - name: Debug - Verificar variáveis de ambiente (PROD)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Verificando variáveis de ambiente..."
          echo "📊 DATABASE_URL configurada: $(if [ -n \"$DATABASE_URL\" ]; then echo 'SIM'; else echo 'NÃO'; fi)"
          
          if [ -n "$DATABASE_URL" ]; then
            echo "📏 Tamanho da DATABASE_URL: ${#DATABASE_URL} caracteres"
            echo "🔗 Primeiros 50 caracteres: ${DATABASE_URL:0:50}..."
            echo "🔗 Últimos 30 caracteres: ...${DATABASE_URL: -30}"
            
            # Extract database host from URL
            DB_HOST=$(echo "$DATABASE_URL" | sed -E 's/.*@([^:\/]+).*/\1/')
            echo "🖥️ Host extraído da URL: $DB_HOST"
            
            # Test DNS resolution of extracted host
            echo "📡 Testando DNS do host extraído:"
            nslookup "$DB_HOST" || echo "⚠️ Falha ao resolver $DB_HOST"
          else
            echo "❌ DATABASE_URL não está definida!"
          fi
          
          echo ""
          echo "🔧 Outras variáveis importantes:"
          echo "NODE_ENV: ${{ secrets.NODE_ENV }}"
          echo "JWT_SECRET configurado: $(if [ -n \"${{ secrets.JWT_SECRET }}\" ]; then echo 'SIM'; else echo 'NÃO'; fi)"

      - name: Fazer deploy via Docker Compose
        id: deploy
        env:
          REDIRECT_PATH: ${{ secrets.REDIRECT_PATH }}
          SCOPE: ${{ secrets.SCOPE }}
          ENDPOINT: ${{ secrets.ENDPOINT }}
          VENDEDORES_API_URL: ${{ secrets.VENDEDORES_API_URL }}
          VENDEDORES_API_USERNAME: ${{ secrets.VENDEDORES_API_USERNAME }}
          VENDEDORES_API_PASSWORD: ${{ secrets.VENDEDORES_API_PASSWORD }}
          VENDEDORES_API_EMAIL: ${{ secrets.VENDEDORES_API_EMAIL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Iniciando deploy na pasta /app/${{ github.event.repository.name }}"
          cd /app/${{ github.event.repository.name }}/
          docker compose up -d --build

      - name: Debug - Verificar container e variáveis internas (PROD)
        run: |
          echo "🔍 Verificando estado do container..."
          cd /app/${{ github.event.repository.name }}/
          
          echo "📊 Status dos containers:"
          docker compose ps
          
          echo ""
          echo "🔍 Verificando variáveis de ambiente dentro do container:"
          docker compose exec -T data-gateway sh -c 'env | grep -E "^(DATABASE_URL|NODE_ENV|SANKHYA)" | while IFS= read -r line; do
            var_name=$(echo "$line" | cut -d= -f1)
            var_value=$(echo "$line" | cut -d= -f2-)
            if [ "$var_name" = "DATABASE_URL" ]; then
              echo "$var_name length: ${#var_value} chars"
              echo "$var_name starts with: ${var_value:0:60}..."
              echo "$var_name ends with: ...${var_value: -40}"
            elif [[ "$var_name" =~ PASSWORD|TOKEN|APPKEY|SECRET ]]; then
              echo "$var_name=[MASKED]"
            else
              echo "$var_name=$var_value"
            fi
          done' || echo "⚠️ Falha ao acessar variáveis"
          
          echo ""
          echo "🌐 Testando DNS dentro do container:"
          docker compose exec -T data-gateway nslookup db-prod-01.c4xu00osgb4n.us-east-1.rds.amazonaws.com || echo "⚠️ DNS falhou dentro do container"
          
          echo ""
          echo "📋 Primeiros logs do container:"
          docker compose logs data-gateway --tail=50

      - name: Health check após deploy
        run: |
          echo "Aguardando aplicação ficar saudável..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3000/ > /dev/null; then
              echo "✅ Aplicação está saudável"
              break
            fi
            echo "⏳ Aguardando aplicação ficar saudável... ($i/30)"
            sleep 10
          done

          if [ $i -eq 30 ]; then
            echo "❌ Falha no health check após deploy"
            echo "📊 Status dos containers:"
            cd /app/${{ github.event.repository.name }}/
            docker compose ps
            echo "📋 Logs do serviço ${{ github.event.repository.name }}:"
            docker compose logs ${{ github.event.repository.name }} --tail=100
            exit 1
          fi

      - name: Notificar sucesso do deploy
        if: success()
        run: |
          echo "✅ Deploy realizado com sucesso!"
          cd /app/${{ github.event.repository.name }}/
          echo "📊 Status final dos containers:"
          docker compose ps

      - name: Rollback em caso de falha
        if: failure()
        run: |
          echo "❌ Deploy falhou, iniciando rollback..."
          cd /app/${{ github.event.repository.name }}/
          echo "📋 Logs antes do rollback:"
          docker compose down
          docker compose up -d --no-build
          echo "🔄 Rollback concluído"
